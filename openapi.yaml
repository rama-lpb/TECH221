openapi: 3.0.3
info:
  title: API Gestion Projets & Employés
  version: 1.0.0
  description: |-
    API RESTful pour gérer les départements, employés, projets et affectations.
    Documentation générée à partir du code source du projet.
servers:
  - url: http://localhost:3000/api/v1
    description: Serveur local
  - url: https://tech221.onrender.com/api/v1
    description: Serveur de production (Render)
tags:
  - name: Health
    description: Points de santé
  - name: Auth
    description: Authentification (login, register)
  - name: Departements
    description: Gestion des départements
  - name: SousDepartements
    description: Gestion des sous-départements (dépend d'un département)
  - name: Employes
    description: Gestion des employés
  - name: Projets
    description: Gestion des projets
  - name: Affectations
    description: Gestion des affectations (employé ↔ projet)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time

    Departement:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        libelle:
          type: string
        sousDepartement:
          type: string
          nullable: true
        sousDepartements:
          type: array
          description: Liste des sous-départements (uniquement pour un département racine)
          items:
            $ref: '#/components/schemas/SousDepartement'
        archive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        id: 1
        code: "INFO"
        libelle: "Informatique"
        sousDepartement: null
        sousDepartements:
          - id: 2
            code: "INFO"
            libelle: "Informatique"
            sousDepartement: "Backend"
            archive: false
            createdAt: "2024-01-15T10:00:00Z"
            updatedAt: "2024-01-15T10:00:00Z"
        archive: false
        createdAt: "2024-01-15T10:00:00Z"
        updatedAt: "2024-01-15T10:00:00Z"

    DepartementCreate:
      type: object
      required: [code, libelle]
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 10
        libelle:
          type: string
      example:
        code: "INFO"
        libelle: "Informatique"

    DepartementUpdate:
      type: object
      properties:
        code:
          type: string
        libelle:
          type: string
        archive:
          type: boolean

    SousDepartement:
      type: object
      required: [id, code, libelle, sousDepartement]
      properties:
        id:
          type: integer
        code:
          type: string
        libelle:
          type: string
        sousDepartement:
          type: string
        archive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SousDepartementCreate:
      type: object
      required: [sousDepartement]
      properties:
        sousDepartement:
          type: string
          minLength: 1
          maxLength: 50
      example:
        sousDepartement: "Backend"

    SousDepartementUpdate:
      type: object
      properties:
        sousDepartement:
          type: string
          minLength: 1
          maxLength: 50
        archive:
          type: boolean

    Employe:
      type: object
      properties:
        id:
          type: integer
        prenom:
          type: string
        nom:
          type: string
        email:
          type: string
          format: email
        telephone:
          type: string
        departementId:
          type: integer
        departement:
          $ref: '#/components/schemas/Departement'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EmployeCreate:
      type: object
      required: [prenom, nom, email, telephone, departementId]
      properties:
        prenom:
          type: string
        nom:
          type: string
        email:
          type: string
          format: email
        telephone:
          type: string
        departementId:
          type: integer

    EmployeUpdate:
      type: object
      properties:
        prenom:
          type: string
        nom:
          type: string
        email:
          type: string
          format: email
        telephone:
          type: string
        departementId:
          type: integer

    Projet:
      type: object
      properties:
        id:
          type: integer
        nom:
          type: string
        description:
          type: string
          nullable: true
        dateDebut:
          type: string
          format: date-time
        dateFin:
          type: string
          format: date-time
          nullable: true
        statut:
          type: string
          enum: [BROUILLON, EN_COURS, TERMINE, ANNULE]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjetCreate:
      type: object
      required: [nom, dateDebut]
      properties:
        nom:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date-time
        dateFin:
          type: string
          format: date-time
        statut:
          type: string
          enum: [BROUILLON, EN_COURS, TERMINE, ANNULE]

    ProjetUpdate:
      type: object
      properties:
        nom:
          type: string
        description:
          type: string
        dateDebut:
          type: string
          format: date-time
        dateFin:
          type: string
          format: date-time
          nullable: true
        statut:
          type: string
          enum: [BROUILLON, EN_COURS, TERMINE, ANNULE]

    Affectation:
      type: object
      properties:
        id:
          type: integer
        employeId:
          type: integer
        projetId:
          type: integer
        role:
          type: string
        dateAffectation:
          type: string
          format: date-time
        employe:
          $ref: '#/components/schemas/Employe'
        projet:
          $ref: '#/components/schemas/Projet'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AffectationCreate:
      type: object
      required: [employeId, projetId, role, dateAffectation]
      properties:
        employeId:
          type: integer
        projetId:
          type: integer
        role:
          type: string
        dateAffectation:
          type: string
          format: date-time

    AffectationUpdate:
      type: object
      properties:
        role:
          type: string
        dateAffectation:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        nom:
          type: string
        prenom:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, USER]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterRequest:
      type: object
      required: [email, password, nom, prenom]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        nom:
          type: string
        prenom:
          type: string
        role:
          type: string
          enum: [ADMIN, MANAGER, USER]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
        refreshToken:
          type: string

    RegisterResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        nom:
          type: string
        prenom:
          type: string
        role:
          type: string
        message:
          type: string

    ResponseSuccess:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true

    ResponseError:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        details:
          type: object

  parameters:
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    projetIdParam:
      name: projetId
      in: path
      required: true
      schema:
        type: integer

paths:
  /health:
    get:
      tags: [Health]
      summary: Vérifie l'état du service
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription d'un nouvel utilisateur
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Compte créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Erreur de validation
        '409':
          description: Email déjà utilisé

  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants incorrects

  /departements:
    get:
      tags: [Departements]
      summary: Lister les départements
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: archive
          schema:
            type: boolean
          description: Inclure les départements archivés si true
      responses:
        '200':
          description: Liste des départements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Departement'

    post:
      tags: [Departements]
      summary: Créer un département
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartementCreate'
      responses:
        '201':
          description: Département créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'
        '400':
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'

  /departements/{id}:
    get:
      tags: [Departements]
      summary: Récupère un département par ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Département trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'
        '404':
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'

    put:
      tags: [Departements]
      summary: Mettre à jour un département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartementUpdate'
      responses:
        '200':
          description: Département mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    patch:
      tags: [Departements]
      summary: Archiver un département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Département archivé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    delete:
      tags: [Departements]
      summary: Supprimer un département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Département supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /departements/{id}/sous-departements:
    get:
      tags: [SousDepartements]
      summary: Lister les sous-départements d'un département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
        - in: query
          name: archive
          schema:
            type: boolean
          description: Inclure les sous-départements archivés si true
      responses:
        '200':
          description: Liste des sous-départements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SousDepartement'

    post:
      tags: [SousDepartements]
      summary: Créer un sous-département pour un département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SousDepartementCreate'
      responses:
        '201':
          description: Sous-département créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SousDepartement'
        '400':
          description: Erreur de validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'

  /sous-departements/{id}:
    get:
      tags: [SousDepartements]
      summary: Récupère un sous-département par ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Sous-département trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SousDepartement'
        '404':
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'

    put:
      tags: [SousDepartements]
      summary: Mettre à jour un sous-département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SousDepartementUpdate'
      responses:
        '200':
          description: Sous-département mis à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SousDepartement'

    delete:
      tags: [SousDepartements]
      summary: Supprimer un sous-département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Sous-département supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /sous-departements/{id}/archive:
    patch:
      tags: [SousDepartements]
      summary: Archiver un sous-département
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Sous-département archivé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/SousDepartement'

  /employes:
    get:
      tags: [Employes]
      summary: Lister les employés
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des employés
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Employe'

    post:
      tags: [Employes]
      summary: Créer un employé
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeCreate'
      responses:
        '201':
          description: Employé créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /employes/{id}:
    get:
      tags: [Employes]
      summary: Récupère un employé par ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Employé trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'
        '404':
          description: Non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'

    put:
      tags: [Employes]
      summary: Mettre à jour un employé
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeUpdate'
      responses:
        '200':
          description: Employé mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    delete:
      tags: [Employes]
      summary: Supprimer un employé
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Employé supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /employes/{id}/photo:
    post:
      tags: [Employes]
      summary: Upload de la photo d'un employé
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
                  description: Image de l'employé (JPG, PNG, WEBP - max 5MB)
      responses:
        '200':
          description: Photo uploadée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'
        '400':
          description: Format de fichier invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
        '404':
          description: Employé non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'

  /projets:
    get:
      tags: [Projets]
      summary: Lister les projets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des projets
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Projet'

    post:
      tags: [Projets]
      summary: Créer un projet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjetCreate'
      responses:
        '201':
          description: Projet créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /projets/{id}:
    get:
      tags: [Projets]
      summary: Récupère un projet par ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Projet trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    put:
      tags: [Projets]
      summary: Mettre à jour un projet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjetUpdate'
      responses:
        '200':
          description: Projet mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    delete:
      tags: [Projets]
      summary: Supprimer un projet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Projet supprimé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /projets/{projetId}/affectations:
    get:
      tags: [Affectations]
      summary: Lister les affectations d'un projet
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projetIdParam'
      responses:
        '200':
          description: Liste des affectations pour le projet
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Affectation'

  /affectations:
    get:
      tags: [Affectations]
      summary: Lister les affectations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des affectations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Affectation'

    post:
      tags: [Affectations]
      summary: Créer une affectation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffectationCreate'
      responses:
        '201':
          description: Affectation créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

  /affectations/{id}:
    get:
      tags: [Affectations]
      summary: Récupère une affectation par ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Affectation trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    put:
      tags: [Affectations]
      summary: Mettre à jour une affectation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AffectationUpdate'
      responses:
        '200':
          description: Affectation mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'

    delete:
      tags: [Affectations]
      summary: Supprimer une affectation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Affectation supprimée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseSuccess'
